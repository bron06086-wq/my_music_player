name: Build Kivy APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # Используем этот экшен, так как он стабильно запускается
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          buildozer_version: master
          # Убедись, что buildozer.spec лежит в корне репозитория
          workdir: . 
        env:
          # ВАЖНО: Эта строка лечит ошибку "chown: invalid user: ‘user’"
          USER: root

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-player-debug
          # Путь, куда Buildozer сохраняет готовый файл
          path: bin/*.apk
