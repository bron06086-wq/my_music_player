name: Final Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Используем 22.04, она стабильнее для Buildozer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          sudo apt install -y python3-pip python3-setuptools python3-dev
          # Устанавливаем Cython и Buildozer принудительно, обходя защиту системы
          pip3 install --user --upgrade Cython==0.29.33 buildozer --break-system-packages

      - name: Install Android SDK/NDK Dependencies
        run: |
          sudo apt install -y openjdk-17-jdk
          # Устанавливаем доп. зависимости для 64-битных систем
          sudo apt install -y libstdc++6:i386 libgcc1:i386 zlib1g:i386 libncurses5:i386

      - name: Build with Buildozer
        run: |
          # Добавляем путь к локально установленному buildozer в PATH
          export PATH=$PATH:~/.local/bin
          # Запускаем сборку. По умолчанию используется 'android debug'
          # Если спросит про лицензии, --yes их подтвердит
          buildozer --verbose android debug
        env:
          # Важно для корректной работы Java внутри раннера
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-music-player
          path: bin/*.apk
