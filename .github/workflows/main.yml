name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # МЫ УХОДИМ С UBUNTU-LATEST НА 22.04, ЧТОБЫ ВСЁ ЗАРАБОТАЛО
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev libgdbm-dev \
          liblzma-dev libreadline-dev uuid-dev libgstreamer1.0-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          # Фиксируем версию Cython, иначе будет ошибка компиляции
          pip install --user Cython==0.29.33 buildozer

      - name: Build APK
        run: |
          # Принудительная очистка, чтобы старый мусор не мешал
          /home/runner/.local/bin/buildozer android clean
          yes | /home/runner/.local/bin/buildozer android debug
        env:
          # Buildozer сейчас требует Java 17 для новых SDK
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-music-player
          path: bin/*.apk
          
