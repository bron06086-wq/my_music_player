name: Build Kivy APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        # Копируем файлы твоего репозитория
        uses: actions/checkout@v4

      - name: Setup Java
        # Устанавливаем Java 17 (необходима для сборки Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        # Ставим все системные библиотеки, включая поддержку 32-битных либ
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip python3-setuptools \
          python3-venv autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libstdc++6 libgcc-s1 zlib1g libncurses5

      - name: Install Buildozer via VENV
        # Создаем виртуальное окружение и ставим Buildozer туда
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer
          # Прописываем путь к venv в системный PATH экшена
          echo "$(pwd)/venv/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        # Запускаем сборку. 'yes |' сам подтверждает все лицензии Android SDK
        run: |
          source venv/bin/activate
          yes | buildozer -v android debug
        env:
          # Указываем путь к Java для корректной работы Gradle
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload Artifact
        # Сохраняем готовый APK, чтобы его можно было скачать
        uses: actions/upload-artifact@v4
        with:
          name: music-player-release
          path: bin/*.apk
