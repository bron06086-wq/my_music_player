name: Build Kivy APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip python3-setuptools \
          autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev libstdc++6:i386 libgcc1:i386 zlib1g:i386 \
          libncurses5:i386

      - name: Install Buildozer and Cython
        run: |
          # Используем флаг для обхода защиты системы
          pip3 install --user --upgrade "Cython<3.0" buildozer --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # Автоматически принимаем все лицензии Android SDK
          yes | buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
