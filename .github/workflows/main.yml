name: Build Kivy APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Устанавливаем все системные зависимости вручную
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-setuptools \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libstdc++6:i386 \
            libgcc1:i386 \
            zlib1g:i386 \
            libncurses5:i386

      # Ставим Buildozer и Cython, игнорируя защиту системы (PEP 668)
      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade Cython==0.29.33 buildozer --break-system-packages
          # Добавляем путь к бинарникам в переменную окружения раннера
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: |
          # Принимаем все лицензии Android автоматически и запускаем сборку
          # --verbose покажет подробный лог, если что-то пойдет не так
          yes | buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-player-apk
          # Путь к файлу после успешной сборки
          path: bin/*.apk
