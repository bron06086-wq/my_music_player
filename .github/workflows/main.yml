name: Build Kivy APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # Этот экшен точно существует и работает
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          buildozer_version: master
          # Оставляем точку, если buildozer.spec в корне репозитория
          workdir: . 
        env:
          # ВАЖНО: Эта строка исправляет ошибку 'chown: invalid user: user'
          USER: root

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-player-debug
          # Путь куда Buildozer складывает готовый APK
          path: bin/*.apk
