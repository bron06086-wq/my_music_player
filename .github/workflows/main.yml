name: Build Kivy APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          # Включаем поддержку 32-битных пакетов (КРИТИЧНО для Android SDK)
          sudo dpkg --add-architecture i386
          sudo apt-get update
          
          # Устанавливаем зависимости (исправлены имена пакетов для Ubuntu 22.04)
          sudo apt install -y git zip unzip python3-pip python3-setuptools \
          autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libstdc++6:i386 libgcc-s1:i386 zlib1g:i386 libncurses5:i386

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade "Cython<3.0" buildozer --break-system-packages
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # Принудительно обновляем PATH для текущего шага
          export PATH=$PATH:/home/runner/.local/bin
          yes | buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-player-apk
          path: bin/*.apk
