name: Build Music Player APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # Используем современный экшен от Action-Kivy
        uses: Action-Kivy/buildozer-action@v1
        id: buildozer
        with:
          buildozer_version: master
          python_version: 3.11
          # Если buildozer.spec лежит в корне, оставляем точку
          workdir: .
        env:
          # Этот флаг разрешает установку пакетов в новых версиях Python
          PIP_BREAK_SYSTEM_PACKAGES: 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-player-release
          path: bin/*.apk
