name: Final Build Fix
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Используем строго 22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev libgdbm-dev \
          liblzma-dev libreadline-dev uuid-dev libgstreamer1.0-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install --user Cython==0.29.33 buildozer
          # Исправляем возможный конфликт Pillow
          pip install --user "Pillow<10.0.0" 

      - name: Build with Buildozer
        run: |
          # Полная очистка перед сборкой
          /home/runner/.local/bin/buildozer android clean
          # Запуск сборки
          yes | /home/runner/.local/bin/buildozer android debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-Fixed
          path: bin/*.apk
          
