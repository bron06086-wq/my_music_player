name: Build Kivy APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip python3-setuptools \
          python3-venv autoconf automake libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libstdc++6 libgcc-s1 zlib1g libncurses5

      - name: Install Buildozer via VENV
        run: |
          # Создаем виртуальное окружение, чтобы обойти защиту системы
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer
          # Добавляем путь к venv в системный PATH
          echo "$(pwd)/venv/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          source venv/bin/activate
          # Автоматическое принятие лицензий и запуск сборки
          yes | buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-player-apk
          path: bin/*.apk
