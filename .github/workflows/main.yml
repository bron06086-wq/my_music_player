name: Build Kivy APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          # 1. Включаем архитектуру i386
          sudo dpkg --add-architecture i386
          
          # 2. Очищаем старые кэши, которые могут давать ошибку 100
          sudo apt-get clean
          sudo apt-get update
          
          # 3. Устанавливаем зависимости. 
          # В Ubuntu 22.04 пакет libgcc1 заменен на libgcc-s1.
          # Если i386 пакеты не находит, пробуем поставить основные версии.
          sudo apt-get install -y git zip unzip python3-pip python3-setuptools \
          autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libstdc++6 libgcc-s1 zlib1g libncurses5 \
          libstdc++6:i386 libgcc-s1:i386 zlib1g:i386 libncurses5:i386 || echo "Some i386 packages skipped"

      - name: Install Buildozer and Cython
        run: |
          # Используем флаг для обхода защиты внешних пакетов
          pip3 install --user --upgrade "Cython<3.0" buildozer --break-system-packages
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # Принудительно задаем путь и запускаем
          export PATH=$PATH:/home/runner/.local/bin
          yes | buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-player-apk
          path: bin/*.apk
