name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip python3-venv \
          autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          libstdc++6 libgcc-s1 zlib1g libncurses5

      - name: Build with Buildozer
        run: |
          # Создаем виртуальное окружение и ставим билдзер в один этап
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer
          # Запускаем сборку напрямую из venv
          yes | venv/bin/buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: music-player-debug
          path: bin/*.apk
          
